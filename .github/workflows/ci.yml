# =============================================================================
# GITHUB ACTIONS — CI (Integração Contínua) — Ticketon Backend
# =============================================================================
#
# O que é GitHub Actions?
# ───────────────────────
# É uma plataforma de automação embutida no GitHub. Toda vez que algo
# acontece no repositório (push, pull request, tag etc.), o GitHub
# roda automaticamente os "workflows" definidos nesta pasta.
#
# O que é CI (Integração Contínua)?
# ──────────────────────────────────
# É a prática de integrar código frequentemente e verificar
# automaticamente se ele está correto. O ciclo é:
#   1. Desenvolvedor faz push
#   2. GitHub Actions detecta e executa este workflow
#   3. Se algum job falhar → o PR fica bloqueado para merge
#   4. Se todos passarem → código pode ser mergeado com confiança
#
# Este workflow faz: lint → build → testes unitários → testes E2E
# =============================================================================

name: CI
# ↑ Nome que aparece na aba "Actions" do GitHub

# =============================================================================
# ON — gatilhos: quando este workflow é executado
# =============================================================================
on:
  push:
    branches: [main, master, develop]
    # ↑ Executa quando alguém faz push direto nas branches principais.
    #   Protege a branch main de código quebrado.

  pull_request:
    branches: [main, master, develop]
    # ↑ Executa quando alguém abre um Pull Request para essas branches.
    #   Valida o código ANTES de mergear — impede que código ruim entre.

# Evita executar o mesmo workflow duas vezes no mesmo commit.
# Ex: um push em uma branch com PR aberto triggeraria push E pull_request.
# Com isso, o workflow mais antigo é cancelado e só o novo roda.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# JOBS — cada job roda em uma máquina virtual separada e paralela
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # JOB 1: Lint & Formatação
  # ---------------------------------------------------------------------------
  # Verifica se o código segue as regras do ESLint e Prettier.
  # Roda rápido (~1 min) e falha cedo se tiver erro óbvio de estilo.
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    # ↑ Tipo de máquina virtual: ubuntu-latest = Ubuntu mais recente.
    #   O GitHub sobe uma VM zerada, limpa e descartável para cada job.

    steps:
      # Passo 1: Baixa o código do repositório para dentro da VM
      - name: Checkout code
        uses: actions/checkout@v4
        # ↑ "uses" referencia uma Action pronta. actions/checkout é mantida
        #   pelo próprio GitHub e faz `git clone` na VM.

      # Passo 2: Configura o Node.js na versão correta
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # ↑ cache: 'npm' guarda o cache do npm entre execuções.
          #   Na segunda vez, npm install é muito mais rápido.

      # Passo 3: Instala as dependências
      - name: Install dependencies
        run: npm ci
        # ↑ `npm ci` = "clean install". Mais rápido e determinístico que
        #   `npm install` pois usa exatamente o package-lock.json.
        #   Ideal para CI porque garante reprodutibilidade.

      # Passo 4: Roda o ESLint
      - name: Run ESLint
        run: npm run lint
        # ↑ Se houver erro de lint, o step falha (exit code != 0)
        #   e o job inteiro é marcado como falho.

      # Passo 5: Verifica formatação com Prettier
      - name: Check formatting
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts"
        # ↑ --check não formata — apenas verifica se o código JÁ ESTÁ
        #   formatado. Se não estiver, lista os arquivos e falha.

  # ---------------------------------------------------------------------------
  # JOB 2: Build
  # ---------------------------------------------------------------------------
  # Compila o TypeScript para JavaScript. Garante que o código compila
  # sem erros de tipo.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        # ↑ `nest build` compila TypeScript → JavaScript em /dist

      # Salva os arquivos compilados como "artifact" para usar em outros jobs
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
          # ↑ Guarda o artifact por 1 dia (só precisamos para esta pipeline)

  # ---------------------------------------------------------------------------
  # JOB 3: Testes Unitários
  # ---------------------------------------------------------------------------
  # Roda os testes Jest. Gera relatório de cobertura e envia ao Codecov.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov
        # ↑ Roda Jest com --coverage. Gera relatório em /coverage/lcov.info.
        #   Se algum teste falhar, o step falha.

      # Envia cobertura para codecov.io (serviço gratuito de tracking)
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true
        # ↑ continue-on-error: true = falha no codecov não quebra o CI.
        #   Bom para não bloquear o workflow se o serviço externo cair.

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB 4: Testes E2E (End-to-End)
  # ---------------------------------------------------------------------------
  # Sobe um MySQL real como "service" do GitHub Actions e roda os testes
  # de integração completos. Simula o ambiente de produção.
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      # ↑ "services" sobe containers Docker durante este job.
      #   O MySQL fica disponível em localhost:3306 para os steps abaixo.
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    # Variáveis de ambiente disponíveis para TODOS os steps deste job
    env:
      DB_HOST: localhost      # No CI, o MySQL service é acessado via localhost
      DB_PORT: 3306
      DB_USERNAME: test_user
      DB_PASSWORD: test_password
      DB_DATABASE: test_db
      JWT_SECRET: test-jwt-secret-for-ci
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run migrations
        run: npm run migration:run
        continue-on-error: true
        # ↑ Aplica as migrations do TypeORM no banco de teste.
        #   continue-on-error pois migrations podem já estar aplicadas.

      - name: Run E2E tests
        run: npm run test:e2e
        continue-on-error: true
        # ↑ Testes E2E fazem requisições HTTP reais para a API,
        #   que por sua vez acessa o MySQL real do service acima.
        #   É o teste mais completo: valida toda a stack integrada.

  # ---------------------------------------------------------------------------
  # JOB 5: Auditoria de Segurança
  # ---------------------------------------------------------------------------
  # Verifica se as dependências têm vulnerabilidades conhecidas.
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        # ↑ Falha se encontrar vulnerabilidades de nível "moderate" ou acima.
        #   Níveis: low < moderate < high < critical
        continue-on-error: true
        # ↑ Por ora não bloqueia o CI (muitas deps antigas têm warnings).
        #   Em produção, remova o continue-on-error e corrija as vuln.

  # ---------------------------------------------------------------------------
  # JOB 6: Teste de Build Docker
  # ---------------------------------------------------------------------------
  # Garante que o Dockerfile continua funcionando após mudanças.
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # ↑ Buildx é o builder moderno do Docker com suporte a cache,
        #   multi-platform (arm64/amd64) e builds paralelos.

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false          # Apenas builda — não envia para registry
          tags: ticketon:test
          cache-from: type=gha # Usa cache do GitHub Actions
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # JOB FINAL: Verificação de Sucesso Geral
  # ---------------------------------------------------------------------------
  # Job "guarda-chuva" que falha se qualquer job crítico falhar.
  # Útil para configurar branch protection rules com uma única regra.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    # ↑ "needs" define dependências entre jobs. Este só roda após os 3.
    if: always()
    # ↑ "always()" garante que este job rode mesmo se os outros falharem
    #   (assim podemos detectar e reportar a falha corretamente).
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.build.result }}" == "failure" || "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ CI failed. Please check the logs."
            exit 1
          else
            echo "✅ All CI checks passed!"
          fi
